name: macOS Intel x86_64

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15-intel

    strategy:
      fail-fast: false
      matrix:
        compiler: [dmd, ldc]

    steps:
      - uses: actions/checkout@v4

      # --- dub をインストール ---
      - name: Install dub
        run: |
          brew update
          brew install dub
          dub --version

      # D言語の公式ミラーから最新版を取得
      - name: Install latest DMD (auto-detect)
        if: matrix.compiler == 'dmd'
        run: |
          curl -fsS https://dlang.org/install.sh | bash -s dmd
          source ~/dlang/dmd-*/activate
          dmd --version

      # --- LDC は Homebrew で安定動作 ---
      - name: Install LDC
        if: matrix.compiler == 'ldc'
        run: |
          brew install ldc
          ldc2 --version

      - name: Run tests
        run: |
          dub test -ax86_64 --parallel -b=unittest-cov