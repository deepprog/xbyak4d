name: macOS Intel x86_64

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: macos-15-intel

    strategy:
      fail-fast: false
      matrix:
        compiler: [dmd, ldc]

    steps:
      - uses: actions/checkout@v4

      # --- DMD 手動インストール ---
      - name: Install DMD manually
        if: matrix.compiler == 'dmd'
        run: |
          curl -fsSL https://downloads.dlang.org/releases/2.x/2.109.1/dmd.2.109.1.osx.tar.xz -o dmd.tar.xz
          tar xf dmd.tar.xz
          sudo cp -r dmd2/osx/bin/* /usr/local/bin/
          sudo cp -r dmd2/osx/lib/* /usr/local/lib/

      # --- LDC は Homebrew で OK ---
      - name: Install LDC
        if: matrix.compiler == 'ldc'
        run: |
          brew install ldc

      - name: Run tests
        run: |
          dub test -ax86_64 --parallel -b=unittest-cov